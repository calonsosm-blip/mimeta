# Supabase local dev config
# Referencia: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

# ── Edge Functions ────────────────────────────────────────────
# Auto-registro de pagos recurrentes (6 AM hora Lima, UTC-5 → 11 AM UTC)
[functions.auto-register-payments]
verify_jwt = false

# Recordatorio de pagos próximos (8 AM hora Lima → 1 PM UTC)
[functions.payment-reminders]
verify_jwt = false
